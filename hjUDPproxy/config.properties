# Remote and local delivery endpoints
#remote: the endpoint from which the proxy receives the stream
#localdelivery: the localendpoint where the proxy delivers te stream
#               for playing purpose (ex., VLC or MPV players probably work)
remote:localhost:6666
localdelivery:localhost:8888

# ============================================================
# ENCRYPTION CONFIGURATION
# ============================================================
# Choose encryption algorithm for secure streaming:
# - none              : No encryption (default)
# - aes-gcm           : AES-GCM (Challenge 1)
# - chacha20-poly1305 : ChaCha20-Poly1305 (Challenge 2)
# - dprg-xor          : DPRG-based stream cipher with XOR (Challenge 3)
encryption.algorithm=none

# Encryption key (in hexadecimal format)
# If not specified, a key will be generated automatically
# For AES: 32 hex chars = 128 bits, 48 hex chars = 192 bits, 64 hex chars = 256 bits
# For ChaCha20: 64 hex chars = 256 bits
# For DPRG: 64 hex chars = 256 bits
encryption.key=

# Optional seed for deterministic key generation (in hexadecimal format)
# Used when encryption.key is not specified
# Allows reproducible key generation from a shared secret
encryption.seed=







